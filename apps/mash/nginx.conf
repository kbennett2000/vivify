# MASH static SPA server (Cycle 9). Internal port fixed at 8090; map a host port with
# `docker run -p <hostport>:8090`. This file replaces nginx:alpine's default.conf.
server {
    listen 8090;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths serve index.html. A missing /characters/index.json
    # therefore returns index.html (text/html), which app.ts treats as "no built-ins"
    # by content-type — matching the Vite dev server's behavior.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed Vite assets are content-addressed and safe to cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
