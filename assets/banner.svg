<?xml version="1.0" encoding="UTF-8"?>
<!--
  vivify — README banner. ORIGINAL artwork (Cycle 13).
  An evocation of a late-90s desktop window: teal desktop, raised silver chrome,
  navy gradient title bar, a generic speech balloon. NO Microsoft/L&H imagery, no
  character pixels — period UI furniture + typography only. Decorative sparkles are
  drawn (not font glyphs), so nothing depends on the viewer's installed fonts except
  the plain-Latin wordmark/tagline. Carries its own opaque background, so it stays
  legible on both GitHub light and dark themes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="vivify — bring Microsoft Agent characters back to life in the browser">
  <defs>
    <!-- Win98-style title-bar gradient (navy → bright blue). -->
    <linearGradient id="titlebar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000080"/>
      <stop offset="1" stop-color="#1084d0"/>
    </linearGradient>
    <!-- Faint CRT scanlines, kept only over the teal desktop so text stays crisp. -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="#008080"/>
      <rect width="4" height="1" fill="#000000" opacity="0.06"/>
    </pattern>
    <!-- A drawn 4-point sparkle (concave star), centered at 0,0, ~radius 10. -->
    <g id="spark"><path d="M0,-10 Q0,0 10,0 Q0,0 0,10 Q0,0 -10,0 Q0,0 0,-10 Z"/></g>
  </defs>

  <!-- Desktop backdrop (own background → theme-safe). -->
  <rect width="1280" height="320" fill="#008080"/>
  <rect width="1280" height="320" fill="url(#scan)"/>

  <!-- ===== Window ===== -->
  <g shape-rendering="crispEdges">
    <!-- Raised silver chrome: black outline, white top/left highlight, gray bottom/right shadow. -->
    <rect x="64" y="48" width="1152" height="224" fill="#000000"/>
    <rect x="64" y="48" width="1150" height="222" fill="#ffffff"/>
    <rect x="66" y="50" width="1148" height="220" fill="#808080"/>
    <rect x="66" y="50" width="1146" height="218" fill="#c0c0c0"/>

    <!-- Title bar -->
    <rect x="72" y="56" width="1136" height="40" fill="url(#titlebar)"/>
    <!-- Tiny app icon: a generic sparkle tile (not a character). -->
    <rect x="80" y="62" width="28" height="28" fill="#c0c0c0" stroke="#000000" stroke-width="1"/>
    <use href="#spark" transform="translate(94,76) scale(0.9)" fill="#000080"/>

    <!-- Window control buttons (minimize / maximize / close) -->
    <g>
      <rect x="1118" y="62" width="28" height="26" fill="#c0c0c0" stroke="#000000" stroke-width="1"/>
      <rect x="1124" y="82" width="12" height="3" fill="#000000"/>
      <rect x="1150" y="62" width="28" height="26" fill="#c0c0c0" stroke="#000000" stroke-width="1"/>
      <rect x="1156" y="68" width="16" height="14" fill="none" stroke="#000000" stroke-width="2"/>
      <rect x="1182" y="62" width="28" height="26" fill="#c0c0c0" stroke="#000000" stroke-width="1"/>
      <path d="M1190,68 l12,12 M1202,68 l-12,12" stroke="#000000" stroke-width="2"/>
    </g>
  </g>

  <!-- Title-bar caption -->
  <text x="120" y="84" font-family="Tahoma, Geneva, Verdana, sans-serif" font-size="20" font-weight="bold" fill="#ffffff">vivify.exe</text>

  <!-- ===== Window body ===== -->
  <!-- Wordmark -->
  <text x="104" y="190" font-family="'Trebuchet MS', Tahoma, Verdana, sans-serif" font-size="92" font-weight="bold" fill="#000080" letter-spacing="1">vivify</text>
  <!-- Tagline (the instructional spine — reads clean with zero nostalgia). -->
  <text x="108" y="230" font-family="Tahoma, Geneva, Verdana, sans-serif" font-size="25" fill="#202020">Microsoft Agent characters, alive again — right in your browser.</text>

  <!-- Generic speech balloon (drawn from scratch) with a talking '...' and sparkles. -->
  <g>
    <path d="M 980 116 h 200 a 14 14 0 0 1 14 14 v 72 a 14 14 0 0 1 -14 14 h -118 l -32 30 v -30 h -50 a 14 14 0 0 1 -14 -14 v -72 a 14 14 0 0 1 14 -14 z"
          fill="#ffffff" stroke="#000080" stroke-width="3"/>
    <!-- talking dots -->
    <circle cx="1040" cy="166" r="9" fill="#000080"/>
    <circle cx="1080" cy="166" r="9" fill="#000080"/>
    <circle cx="1120" cy="166" r="9" fill="#000080"/>
    <!-- sparkles around the balloon -->
    <use href="#spark" transform="translate(956,104) scale(1.1)" fill="#ffffff"/>
    <use href="#spark" transform="translate(1204,120) scale(0.8)" fill="#ffffff"/>
    <use href="#spark" transform="translate(946,224) scale(0.7)" fill="#ffffff"/>
  </g>
</svg>
